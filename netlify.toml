# Netlify deployment config.
# Connect the repo in Netlify (or `netlify deploy`) — these settings are picked up
# automatically. SPA routes (/report) fall back to index.html.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page app: serve index.html for client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sensible default security headers for a static SPA.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
