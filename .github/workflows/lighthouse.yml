name: Lighthouse

# Audits performance / accessibility / best-practices / SEO on every PR.
# Accessibility, best-practices and SEO are blocking ("error"); performance stays
# "warn" because single-run CI performance scores are noisy (see lighthouserc.json).
# Scores are taken as the median of 3 runs to reduce flake.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
