name: Dependabot auto-merge

# Auto-merges Dependabot patch & minor updates once checks pass.
# Requires repo setting: Settings → General → Pull Requests → "Allow auto-merge".
# (Recommended: protect `main` with the `build` check so the merge waits for CI.)
# Major updates are left open for manual review.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for patch & minor updates
        if: >-
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: |
          gh pr merge --auto --squash "$PR_URL" \
            || echo "::warning::Enable 'Allow auto-merge' in repo settings for this to take effect."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
